<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Poo IDE 2</title>

        <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
        <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
        <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
        <script src="https://unpkg.com/blockly/msg/en.js"></script>
        <script src="https://unpkg.com/@blockly/field-colour-hsv-sliders"></script>
        <script src="https://unpkg.com/@blockly/continuous-toolbox"></script>
        <script src="https://unpkg.com/@blockly/field-dependent-dropdown"></script>
        <script src="https://unpkg.com/@blockly/field-multilineinput"></script>
        <script src="blockly-setup.js"></script>

        <script src="blocks.js"></script>
        <script src="generators.js"></script>
        <script src="toolbox.js"></script>
        <script src="zeus-renderer.js"></script>
        <script src="reporter-bubbles.js"></script>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --page-bg: #111316;
                --page-text: #edf1f6;
                --muted-text: #b9c0cb;
                --toolbar-bg: #1b1e23;
                --toolbar-border: #313741;
                --panel-bg: #1c2026;
                --panel-elevated-bg: #262b34;
                --panel-border: #3b424e;
                --panel-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
                --button-bg: #2d333d;
                --button-hover-bg: #39414d;
                --button-text: #f5f7fa;
                --input-bg: #121418;
                --input-border: #49505d;
                --input-text: #f5f7fa;
                --input-placeholder: #929aa7;
                --overlay-bg: rgba(0, 0, 0, 0.55);
                --workspace-bg: #000000;
                --toolbox-bg: #171a20;
                --toolbox-hover-bg: #262c36;
                --toolbox-selected-bg: #343c48;
                --toolbox-text: #edf2f8;
                --flyout-bg: #1d222a;
                --scrollbar-handle: #596273;
                --bubble-bg: #1f242c;
                --bubble-border: #495160;
                --bubble-soft-bg: #2a313b;
                --bubble-text: #f5f7fa;
                --bubble-muted: #c5ccd7;
                --bubble-error-bg: #472828;
                --bubble-error-text: #ffb1b1;
                --status-error: #ff9c9c;
            }

            body[data-theme="light"] {
                --page-bg: #eef1f5;
                --page-text: #161a20;
                --muted-text: #535b67;
                --toolbar-bg: #f0f0f0;
                --toolbar-border: #cccccc;
                --panel-bg: #f0f0f0;
                --panel-elevated-bg: #e6e6e6;
                --panel-border: #cccccc;
                --panel-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
                --button-bg: #ffffff;
                --button-hover-bg: #e8e8e8;
                --button-text: #111111;
                --input-bg: #ffffff;
                --input-border: #cccccc;
                --input-text: #111111;
                --input-placeholder: #757575;
                --overlay-bg: rgba(0, 0, 0, 0.4);
                --workspace-bg: #ffffff;
                --toolbox-bg: #f3f3f3;
                --toolbox-hover-bg: #ebebeb;
                --toolbox-selected-bg: #d7dde7;
                --toolbox-text: #111111;
                --flyout-bg: #ffffff;
                --scrollbar-handle: #b0b7c3;
                --bubble-bg: #ffffff;
                --bubble-border: #bdbdbd;
                --bubble-soft-bg: #f3f3f3;
                --bubble-text: #111111;
                --bubble-muted: #555555;
                --bubble-error-bg: #fff0f0;
                --bubble-error-text: #8b1f1f;
                --status-error: #8b1f1f;
            }

            body {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                font-family: sans-serif;
                background: var(--page-bg);
                color: var(--page-text);
            }

            #toolbar {
                display: flex;
                gap: 6px;
                padding: 6px 10px;
                background: var(--toolbar-bg);
                border-bottom: 1px solid var(--toolbar-border);
                color: var(--page-text);
            }

            #toolbar button {
                padding: 4px 12px;
                cursor: pointer;
                border: 1px solid var(--input-border);
                border-radius: 4px;
                background: var(--button-bg);
                color: var(--button-text);
            }

            #toolbar button:hover {
                background: var(--button-hover-bg);
            }

            #toolbar .toolbar-spacer {
                flex: 1;
            }

            .brand {
                display: flex;
                align-items: center;
                font-weight: 700;
                color: var(--page-text);
            }

            .sep {
                width: 1px;
                align-self: stretch;
                background: var(--toolbar-border);
                margin: 0 2px;
            }

            .toolbar-search {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .toolbar-search-toggle {
                min-width: 60px;
            }

            .toolbar-search input {
                width: 0;
                padding: 4px 0;
                border: 0;
                border-radius: 3px;
                font-size: 13px;
                background: var(--input-bg);
                color: var(--input-text);
                opacity: 0;
                pointer-events: none;
                transition: width 120ms ease, padding 120ms ease, opacity 120ms ease, border-width 120ms ease;
            }

            .toolbar-search input::placeholder {
                color: var(--input-placeholder);
            }

            .toolbar-search.expanded input {
                width: 220px;
                padding: 4px 8px;
                border: 1px solid var(--input-border);
                opacity: 1;
                pointer-events: auto;
            }

            #main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            #blocklyDiv {
                flex: 1;
                height: 100%;
            }

            #blocklyDiv .blocklySvg {
                background: var(--workspace-bg);
            }

            #blocklyDiv .blocklyMainBackground {
                fill: var(--workspace-bg);
            }

            #blocklyDiv .blocklyToolboxDiv {
                background: var(--toolbox-bg);
            }

            #blocklyDiv .blocklyToolboxCategoryContainer,
            #blocklyDiv .blocklyToolboxCategory,
            #blocklyDiv .blocklyToolboxLabel {
                background: var(--toolbox-bg);
                color: var(--toolbox-text);
            }

            #blocklyDiv .blocklyToolboxCategoryLabel,
            #blocklyDiv .blocklyTreeLabel {
                color: var(--toolbox-text);
                fill: var(--toolbox-text);
            }

            #blocklyDiv .blocklyTreeRow {
                border-radius: 6px;
            }

            #blocklyDiv .blocklyToolboxCategory:hover,
            #blocklyDiv .blocklyTreeRow:hover {
                background: var(--toolbox-hover-bg);
            }

            #blocklyDiv .blocklyToolboxSelected,
            #blocklyDiv .blocklyTreeSelected,
            #blocklyDiv .blocklyTreeRow.blocklyTreeSelected {
                background: var(--toolbox-selected-bg) !important;
            }

            #blocklyDiv .blocklyToolboxSelected .blocklyToolboxCategoryLabel {
                color: var(--toolbox-text);
                fill: var(--toolbox-text);
            }

            #blocklyDiv .blocklyFlyoutBackground {
                fill: var(--flyout-bg);
                fill-opacity: 1;
            }

            #blocklyDiv .blocklyFlyoutLabelText {
                fill: var(--toolbox-text);
            }

            #blocklyDiv .blocklyScrollbarHandle {
                fill: var(--scrollbar-handle);
            }

            .blocklyDropDownDiv,
            .blocklyWidgetDiv .goog-menu,
            .blocklyWidgetDiv input,
            .blocklyWidgetDiv textarea {
                background: var(--panel-bg);
                color: var(--page-text);
                border-color: var(--panel-border);
            }

            .blocklyWidgetDiv .goog-menuitem,
            .blocklyWidgetDiv .goog-menuitem-content {
                color: var(--page-text);
            }

            .blocklyWidgetDiv .goog-menuitem-highlight,
            .blocklyWidgetDiv .goog-option-selected {
                background: var(--toolbox-hover-bg);
            }

            #settingsOverlay {
                display: none;
                position: fixed;
                inset: 0;
                background: var(--overlay-bg);
                z-index: 100;
            }

            #settingsOverlay.open {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #settingsPanel {
                background: var(--panel-bg);
                border: 1px solid var(--panel-border);
                padding: 16px 20px;
                width: 340px;
                max-height: 80vh;
                overflow-y: auto;
                font-family: sans-serif;
                font-size: 13px;
                color: var(--page-text);
                box-shadow: var(--panel-shadow);
            }

            #settingsPanel h2 {
                margin: 0 0 12px;
                font-size: 15px;
            }

            #settingsPanel label {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin: 6px 0;
            }

            #settingsPanel select,
            #settingsPanel input[type=number],
            #settingsPanel input[type=color] {
                padding: 2px 6px;
                border: 1px solid var(--input-border);
                border-radius: 3px;
                font-size: 13px;
                background: var(--input-bg);
                color: var(--input-text);
            }

            #settingsPanel select {
                width: 120px;
            }

            #settingsPanel input[type=number] {
                width: 70px;
            }

            #settingsPanel .section {
                margin-top: 10px;
                padding-top: 8px;
                border-top: 1px solid var(--panel-border);
            }

            #settingsPanel .section-title {
                font-weight: bold;
                margin-bottom: 6px;
            }

            #settingsPanel .btn-row {
                display: flex;
                gap: 6px;
                margin-top: 14px;
                justify-content: flex-end;
            }

            #settingsPanel button {
                padding: 4px 14px;
                cursor: pointer;
                border: 1px solid var(--input-border);
                border-radius: 3px;
                background: var(--button-bg);
                color: var(--button-text);
            }

            #settingsPanel button:hover {
                background: var(--button-hover-bg);
            }

            .workspace-find-window {
                display: none;
                position: fixed;
                top: 72px;
                right: 20px;
                width: 280px;
                border: 1px solid var(--panel-border);
                background: var(--panel-bg);
                box-shadow: var(--panel-shadow);
                z-index: 90;
                color: var(--page-text);
            }

            .workspace-find-window.open {
                display: block;
            }

            .workspace-find-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 6px 8px;
                border-bottom: 1px solid var(--panel-border);
                background: var(--panel-elevated-bg);
                cursor: move;
                user-select: none;
            }

            .workspace-find-title {
                font-size: 13px;
                font-weight: bold;
            }

            .workspace-find-close {
                min-width: 24px;
                padding: 2px 6px;
                border: 1px solid var(--input-border);
                background: var(--button-bg);
                color: var(--button-text);
                cursor: pointer;
            }

            .workspace-find-body {
                padding: 8px;
            }

            .workspace-find-body input {
                width: 100%;
                padding: 5px 8px;
                border: 1px solid var(--input-border);
                border-radius: 3px;
                font-size: 13px;
                background: var(--input-bg);
                color: var(--input-text);
            }

            .workspace-find-actions {
                display: flex;
                gap: 6px;
                justify-content: flex-end;
                margin-top: 8px;
            }

            .workspace-find-actions button {
                padding: 4px 10px;
                border: 1px solid var(--input-border);
                background: var(--button-bg);
                color: var(--button-text);
                cursor: pointer;
            }

            .workspace-find-status {
                margin-top: 8px;
                min-height: 16px;
                font-size: 12px;
                color: var(--muted-text);
            }

            .workspace-find-status.error {
                color: var(--status-error);
            }

            .reporter-bubble-layer {
                position: absolute;
                inset: 0;
                pointer-events: none;
                overflow: visible;
                z-index: 50;
            }

            .reporter-bubble {
                position: absolute;
                max-width: 240px;
                pointer-events: auto;
                opacity: 0;
                transform: translateY(-8px);
                transition: opacity 120ms ease, transform 120ms ease;
            }

            .reporter-bubble-box {
                position: relative;
                min-width: 110px;
                max-width: 240px;
                padding: 8px 10px;
                border-radius: 8px;
                background: var(--bubble-bg);
                border: 1px solid var(--bubble-border);
                color: var(--bubble-text);
                font-size: 12px;
                line-height: 1.4;
                white-space: normal;
            }

            .reporter-bubble-visible {
                opacity: 1;
                transform: translateY(0);
            }

            .reporter-bubble-box::before {
                content: "";
                position: absolute;
                left: 50%;
                top: -7px;
                width: 0;
                height: 0;
                border-left: 7px solid transparent;
                border-right: 7px solid transparent;
                border-bottom: 7px solid var(--bubble-border);
                transform: translateX(-50%);
            }

            .reporter-bubble-box::after {
                content: "";
                position: absolute;
                left: 50%;
                top: -6px;
                width: 0;
                height: 0;
                border-left: 6px solid transparent;
                border-right: 6px solid transparent;
                border-bottom: 6px solid var(--bubble-bg);
                transform: translateX(-50%);
            }

            .reporter-bubble-content {
                min-width: 0;
            }

            .reporter-bubble-controls {
                margin-top: 6px;
                text-align: right;
            }

            .reporter-bubble-copy {
                padding: 2px 6px;
                border: 1px solid var(--bubble-border);
                border-radius: 4px;
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
                font-size: 11px;
                line-height: 1.2;
                cursor: pointer;
            }

            .reporter-bubble-copy:hover {
                background: var(--button-hover-bg);
            }

            .reporter-bubble-label {
                margin-bottom: 4px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--bubble-muted);
            }

            .reporter-bubble-value {
                display: block;
                border-radius: 6px;
                padding: 4px 6px;
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
                font-family: Consolas, "Courier New", monospace;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .reporter-bubble-string {
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
            }

            .reporter-bubble-number {
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
            }

            .reporter-bubble-boolean {
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
            }

            .reporter-bubble-expression,
            .reporter-bubble-colour {
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
            }

            .reporter-bubble-css {
                display: block;
                background: var(--bubble-soft-bg);
                color: var(--bubble-text);
            }

            .reporter-bubble-error {
                background: var(--bubble-error-bg);
                color: var(--bubble-error-text);
            }

        </style>
    </head>
    <!-- This isnt vibecoded. Watch my every step.-->

    <body>
        <div id="toolbar">
            <span class="brand">Poo IDE 2</span>
            <div class="sep"></div>
            <button onclick="downloadBlocksXml()" title="Save workspace as .poop">Save</button>
            <button onclick="loadBlocksXml()" title="Load workspace from .poop or XML file">Load</button>
            <div class="sep"></div>
            <button onclick="downloadGeneratedPage()" title="Export generated HTML">Export HTML</button>
            <button onclick="runGeneratedPage()" title="Preview in sandboxed new tab">Preview</button>
            <button onclick="openSettings()" title="Workspace settings">Settings</button>
            <div class="toolbar-spacer"></div>
            <div class="toolbar-search" id="toolbarSearch">
                <button id="toolbarSearchToggle" class="toolbar-search-toggle" type="button" title="Search blocks">Search</button>
                <input id="toolbarSearchInput" type="text" placeholder="Find blocks">
            </div>
        </div>

        <div id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
                <div id="settingsPanel">
                    <h2>Settings</h2>

                    <div class="section">
                        <label>Theme <select id="s-theme">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                            </select></label>
                    </div>

                    <div class="section">
                        <label>Renderer <select id="s-renderer">
                                <option value="zeus">Zeus</option>
                                <option value="zelos">Zelos</option>
                                <option value="geras">Geras</option>
                                <option value="thrasos">Thrasos</option>
                        </select></label>
                </div>

                <div class="section">
                    <div class="section-title">Grid</div>
                    <label>Snap to grid <input type="checkbox" id="s-grid-snap"></label>
                    <label>Spacing <input type="number" id="s-grid-spacing" min="5" max="100"></label>
                    <label>Colour <input type="color" id="s-grid-colour"></label>
                </div>

                <div class="section">
                    <div class="section-title">Zoom</div>
                    <label>Scroll to zoom <input type="checkbox" id="s-zoom-wheel"></label>
                    <label>Zoom controls <input type="checkbox" id="s-zoom-controls"></label>
                    <label>Min scale <input type="number" id="s-zoom-min" min="0.1" max="1" step="0.1"></label>
                    <label>Max scale <input type="number" id="s-zoom-max" min="1" max="10" step="0.5"></label>
                </div>

                <div class="section">
                    <div class="section-title">Other</div>
                    <label>Trashcan <input type="checkbox" id="s-trashcan"></label>
                    <label>Sounds <input type="checkbox" id="s-sounds"></label>
                </div>

                <div class="btn-row">
                    <button onclick="applySettings()">Apply</button>
                    <button onclick="closeSettings()">Cancel</button>
                </div>
            </div>
        </div>

        <div id="workspaceFindWindow" class="workspace-find-window">
            <div id="workspaceFindHeader" class="workspace-find-header">
                <span class="workspace-find-title">Find In Workspace</span>
                <button id="workspaceFindClose" class="workspace-find-close" type="button" title="Close">x</button>
            </div>
            <div class="workspace-find-body">
                <input id="workspaceFindInput" type="text" placeholder="Find block text">
                <div class="workspace-find-actions">
                    <button id="workspaceFindNext" type="button">Find Next</button>
                </div>
                <div id="workspaceFindStatus" class="workspace-find-status"></div>
            </div>
        </div>

        <div id="main">
            <div id="blocklyDiv"></div>
        </div>

        <script src="download.js"></script>
        <script src="app.js"></script>

        <!-- Poopy butt dookie-->
    </body>

</html>
